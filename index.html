<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse City | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060810;
            --panel: #0d1120;
            --gold: #f0a500;
            --text: #c8d6f0;
            --red: #ff3b3b;
            --green: #00e676;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--panel);
            border: 1px solid #1e2a45;
            padding: 2.5rem;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        h1 { font-family: 'Orbitron'; color: var(--gold); margin-bottom: 1.5rem; letter-spacing: 2px; }
        .form-group { margin-bottom: 1.2rem; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--gold); }
        input {
            width: 100%; padding: 14px; background: #060810; border: 1px solid #1e2a45;
            color: white; border-radius: 10px; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(240, 165, 0, 0.2); }
        .btn {
            width: 100%; padding: 14px; background: var(--gold); border: none;
            color: black; font-weight: 900; border-radius: 10px; cursor: pointer;
            margin-top: 1rem; transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: #ffcc44; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #dashboard { display: none; }
        .welcome-card { background: #060810; padding: 20px; border-radius: 12px; margin: 20px 0; border: 1px solid #1e2a45; }
        .reward-display { color: var(--green); font-weight: bold; margin-top: 15px; font-size: 1.1rem; display: none; }
        .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <h1>ECLIPSE CITY</h1>
        <p>سجل دخولك بحسابك في اللعبة</p>
        
        <div class="form-group">
            <label>إسم المستخدم (UCP)</label>
            <input type="text" id="login-user" placeholder="Simo_Eclipse">
        </div>
        
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>

        <div id="login-error" class="error-msg">خطأ في الإسم أو كلمة السر</div>
        <button class="btn" id="login-btn" onclick="doLogin()">دخول الحساب</button>
    </div>

    <div id="dashboard" class="container">
        <h1>DASHBOARD</h1>
        <div class="welcome-card">
            <p>مرحباً بك، <span id="display-name" style="color:var(--gold); font-weight:bold;"></span></p>
            <p style="font-size: 0.8rem; color: #5a6a85;">حسابك مربوط بقاعدة البيانات</p>
        </div>

        <div class="form-group">
            <label>أدخل كود الهدية (Redeem Code)</label>
            <input type="text" id="gift-code" placeholder="EC-XXXX-XXXX">
            <div id="reward-info" class="reward-display"></div>
            <div id="redeem-error" class="error-msg"></div>
        </div>

        <button class="btn" id="redeem-btn" onclick="doRedeem()">تفعيل الكود</button>
        <button class="btn" style="background: #1a2035; color: white; margin-top: 20px;" onclick="location.reload()">تسجيل الخروج</button>
    </div>

    <script>
        let sessionUser = "";

        // 1. Logic d'Authentification
        async function doLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('login-error');

            if(!user || !pass) return;

            btn.disabled = true;
            btn.textContent = 'جاري التحقق...';
            error.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if(data.success) {
                    sessionUser = data.user.username;
                    document.getElementById('display-name').textContent = sessionUser;
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                } else {
                    error.textContent = data.message || "فشل تسجيل الدخول";
                    error.style.display = 'block';
                }
            } catch (e) {
                error.textContent = "مشكل في الاتصال بالسيرفر";
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'دخول الحساب';
            }
        }

        // 2. Logic de Redeem (الكودات)
        async function doRedeem() {
            const code = document.getElementById('gift-code').value;
            const btn = document.getElementById('redeem-btn');
            const rewardInfo = document.getElementById('reward-info');
            const errorInfo = document.getElementById('redeem-error');

            if(!code) return;

            btn.disabled = true;
            rewardInfo.style.display = 'none';
            errorInfo.style.display = 'none';

            try {
                const response = await fetch('/api/redeem', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: sessionUser, code: code })
                });

                const data = await response.json();

                if(data.success) {
                    // هنا كتطلع سمية الهدية اللي صيفطنا من الباكيند (مثلا: حصلت على Tahoma)
                    rewardInfo.textContent = "✅ " + data.message;
                    rewardInfo.style.display = 'block';
                    document.getElementById('gift-code').value = "";
                } else {
                    errorInfo.textContent = "❌ " + data.message;
                    errorInfo.style.display = 'block';
                }
            } catch (e) {
                errorInfo.textContent = "❌ فشل الاتصال بالـ API";
                errorInfo.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
